name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow pillow-heif pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "HEIC-to-JPG" --hidden-import pillow_heif heic_converter.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HEIC-to-JPG-Windows
          path: dist/HEIC-to-JPG.exe
